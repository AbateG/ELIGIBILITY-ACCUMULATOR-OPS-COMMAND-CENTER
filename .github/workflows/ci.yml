name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate syntax
      run: |
        python -m py_compile src/**/*.py tests/**/*.py
        echo "All Python files compile successfully"

    - name: Run tests
      run: |
        python -m pytest -v --tb=short --strict-markers
        echo "All tests passed"

    - name: Generate coverage report
      run: |
        python -m pytest --cov=src --cov-report=xml
      if: matrix.python-version == '3.12'

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      if: matrix.python-version == '3.12'

  quality:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check for syntax errors
      run: |
        find src tests -name "*.py" -exec python -m py_compile {} \;
        echo "Syntax validation passed"

    - name: Check imports
      run: |
        python -c "import src.common.db; import src.processing.process_eligibility; import src.processing.process_claims; print('Import validation passed')"

    - name: Validate schema
      run: |
        python -c "
        import sqlite3
        import os
        from pathlib import Path

        # Create test database
        db_path = 'test_schema.db'
        os.environ['SQLITE_DB_PATH'] = db_path

        # Initialize schema
        from src.db.init_db import init_database
        init_database(reset=True)

        # Verify schema
        with db_session() as conn:
            tables = conn.execute(\"SELECT name FROM sqlite_master WHERE type='table'\").fetchall()
            table_names = [t[0] for t in tables]
            expected_tables = ['schema_metadata', 'clients', 'vendors', 'benefit_plans', 'members', 'eligibility_periods', 'claims', 'accumulator_transactions', 'accumulator_snapshots', 'processing_runs', 'inbound_files', 'data_quality_issues', 'support_cases', 'audit_log']
            missing = set(expected_tables) - set(table_names)
            if missing:
                raise Exception(f'Missing tables: {missing}')
            print('Schema validation passed')
        "

  release-validation:
    runs-on: ubuntu-latest
    needs: [test, quality]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run smoke test
      run: |
        python -c "
        from src.common.db import db_session, fetch_all
        from src.processing.process_eligibility import get_validated_eligibility_files
        from src.processing.process_claims import get_validated_claim_files

        # Test basic functionality
        files = get_validated_eligibility_files()
        claims = get_validated_claim_files()
        print(f'Smoke test passed: {len(files)} eligibility files, {len(claims)} claims files ready')
        "

    - name: Validate documentation
      run: |
        # Check that key documentation files exist
        docs_files = [
            'docs/DATA_CONTRACTS.md',
            'docs/BUSINESS_RULES_REVIEW.md',
            'docs/UI_ENHANCEMENT_ROADMAP.md',
            'docs/PRODUCTION_READINESS.md'
        ]
        for doc in docs_files:
            if not os.path.exists(doc):
                raise Exception(f'Missing documentation: {doc}')
        echo "Documentation validation passed"

    - name: Check version consistency
      run: |
        # Verify schema version matches documentation
        with open('db/schema.sql', 'r') as f:
            content = f.read()
            if \"'v1_mvp'\" not in content:
                raise Exception('Schema version not found in schema.sql')
        echo "Version consistency check passed"

  performance-baseline:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && contains(github.event.head_commit.message, 'perf')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run performance tests
      run: |
        python -m pytest tests/test_performance.py::test_accumulator_rebuild_performance_existing_data -v --tb=short
        echo "Performance baseline recorded"

    - name: Record benchmark
      run: |
        echo "Performance baseline: $(date)" >> performance-baseline.txt
        echo "Commit: ${{ github.sha }}" >> performance-baseline.txt